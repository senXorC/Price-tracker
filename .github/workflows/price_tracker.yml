name: Price Tracker - Theo dõi giá & cảnh báo Telegram

on:
  # Chạy định kỳ: mỗi ngày 8h sáng, 12h trưa, 5h chiều (ICT = UTC+7)
  schedule:
   - cron: "*/5 * * * *"

  # Cho phép chạy thủ công từ GitHub UI
  workflow_dispatch:
    inputs:
      mode:
        description: "Chế độ chạy"
        required: true
        default: "report"
        type: choice
        options:
          - report        # Gửi báo cáo đầy đủ
          - alert_only    # Chỉ gửi khi biến động vượt ngưỡng

jobs:
  track-prices:
    name: Lấy giá & gửi Telegram
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Cache lịch sử giá giữa các lần chạy
      - name: Restore price history cache
        uses: actions/cache@v4
        with:
          path: price_history.json
          key: price-history-${{ runner.os }}
          restore-keys: |
            price-history-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Xác định RUN_MODE: scheduled 8h/12h/17h → report, còn lại → alert_only
      - name: Set run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "01" ] || [ "$HOUR" = "05" ] || [ "$HOUR" = "10" ]; then
              echo "mode=report" >> $GITHUB_OUTPUT
            else
              echo "mode=alert_only" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run price tracker
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VNAPPMOB_API_KEY: ${{ secrets.VNAPPMOB_API_KEY }}
          ALERT_THRESHOLD: ${{ vars.ALERT_THRESHOLD || '5.0' }}
          RUN_MODE: ${{ steps.mode.outputs.mode }}
        run: python price_tracker.py

      # Lưu lịch sử giá để lần sau so sánh
      - name: Save price history cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: price_history.json
          key: price-history-${{ runner.os }}-${{ github.run_id }}
